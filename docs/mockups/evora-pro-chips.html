<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Evora — Pro advanced (chips)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#f4f7fb;--dim:#aeb8c4;--muted:#6f7c89;--amber:#ff9242;--amber-soft:#ffb274;--green:#3fe0a0;--red:#ff5a5f;--line:rgba(255,255,255,.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#04050a;display:flex;align-items:center;justify-content:center;font-family:"Barlow Semi Condensed",sans-serif;}
  .bezel{padding:16px;background:linear-gradient(180deg,#0a0c12,#05070b);border:1px solid #1b2330;border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.7);}
  .screen{position:relative;width:960px;height:544px;border-radius:12px;overflow:hidden;color:var(--ink);background:radial-gradient(130% 120% at 50% -20%,#16202e 0%,#0a1019 45%,#06090f 100%);}
  .top{position:absolute;top:0;left:0;right:0;height:62px;display:flex;align-items:center;gap:16px;padding:0 28px;border-bottom:1px solid var(--line);}
  .back{display:flex;align-items:center;gap:10px;color:var(--amber);font-family:Rajdhani;font-weight:700;font-size:26px;}
  .ttl{font-family:Rajdhani;font-weight:700;font-size:30px;letter-spacing:3px;}
  .sp{flex:1;}.clock{font-family:Rajdhani;font-weight:600;font-size:22px;color:var(--muted);}
  .protag{display:flex;align-items:center;gap:7px;background:rgba(255,146,66,.16);border:1px solid var(--amber);border-radius:9px;padding:4px 12px;color:var(--amber-soft);font-family:Rajdhani;font-weight:700;font-size:19px;letter-spacing:1.5px;}
  .body{position:absolute;top:70px;left:24px;right:24px;bottom:20px;overflow:hidden;}
  .sec{color:var(--amber-soft);font-family:Rajdhani;font-weight:700;font-size:16px;letter-spacing:2px;margin:6px 2px 9px;text-transform:uppercase;}
  .row{display:flex;flex-wrap:wrap;gap:11px;margin-bottom:14px;}
  .chip{background:linear-gradient(180deg,#18222e,#0d141c);border:1px solid var(--line);border-radius:13px;padding:9px 14px 11px;min-width:132px;display:flex;flex-direction:column;gap:2px;}
  .chip.danger{border-color:rgba(255,90,95,.5);}
  .chip .k{color:var(--muted);font-size:13px;letter-spacing:.4px;text-transform:uppercase;font-weight:600;}
  .chip .v{font-family:Rajdhani;font-weight:700;font-size:25px;color:var(--amber-soft);line-height:1;}
  .chip .v .u{font-size:14px;color:var(--muted);margin-left:2px;}
  .chip.danger .v{color:#ff8a8e;}
  .scrim{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,#06090f);pointer-events:none;}
</style></head>
<body>
<div class="bezel"><div class="screen">
  <div class="top">
    <div class="back">&lt; BACK</div>
    <div class="ttl">MAIN ROTOR</div>
    <div class="sp"></div>
    <div class="protag">&#9888; PRO</div>
    <div class="clock">14:32</div>
  </div>
  <div class="body">
    <div class="sec">Geometry</div>
    <div class="row">
      <div class="chip"><span class="k">Cyclic cal</span><span class="v">100<span class="u">%</span></span></div>
      <div class="chip"><span class="k">Coll cal</span><span class="v">100<span class="u">%</span></span></div>
      <div class="chip"><span class="k">Geo corr</span><span class="v">0<span class="u">%</span></span></div>
      <div class="chip danger"><span class="k">Coll limit</span><span class="v">12.0<span class="u">deg</span></span></div>
      <div class="chip danger"><span class="k">Total limit</span><span class="v">16.0<span class="u">deg</span></span></div>
      <div class="chip"><span class="k">Phase</span><span class="v">0<span class="u">deg</span></span></div>
    </div>
    <div class="sec">Swashplate trims</div>
    <div class="row">
      <div class="chip"><span class="k">Roll trim</span><span class="v">0</span></div>
      <div class="chip"><span class="k">Pitch trim</span><span class="v">0</span></div>
      <div class="chip"><span class="k">Coll trim</span><span class="v">0</span></div>
      <div class="chip"><span class="k">Tilt +</span><span class="v">0</span></div>
      <div class="chip"><span class="k">Tilt -</span><span class="v">10</span></div>
    </div>
    <div class="sec">Directions</div>
    <div class="row">
      <div class="chip danger"><span class="k">Rotor dir</span><span class="v">CW</span></div>
      <div class="chip danger"><span class="k">Aileron</span><span class="v">Norm</span></div>
      <div class="chip danger"><span class="k">Elevator</span><span class="v">Norm</span></div>
      <div class="chip danger"><span class="k">Collective</span><span class="v">Norm</span></div>
    </div>
  </div>
  <div class="scrim"></div>
</div></div>
</body></html>
