<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>OpenBar idle</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  html,body{height:100%;overflow:hidden;background:#05070a;display:flex;align-items:center;justify-content:center;}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .cap{color:#6b7682;font-size:14px;font-weight:600;}
  .bezel{padding:14px;background:#04060a;border:1px solid #161d27;border-radius:22px;box-shadow:0 24px 70px rgba(0,0,0,.6);}
  .screen{position:relative;width:960px;height:544px;border-radius:10px;overflow:hidden;
    background:radial-gradient(130% 110% at 78% 18%, #141b27 0%, #0a0e14 52%, #05080c 100%);color:#eef3f9;}
  .wm{position:absolute;left:-70px;bottom:-60px;width:520px;height:520px;opacity:.05;}
  .wm svg{width:100%;height:100%;}
  /* toolbar */
  .top{position:absolute;top:0;left:0;right:0;height:74px;display:flex;align-items:center;padding:0 30px;gap:24px;}
  .ic{width:30px;height:30px;color:#9aa6b3;}.ic svg{width:28px;height:28px;}
  .ic.act{color:#ff8a3d;}
  .sp{flex:1;}
  .clock{color:#aeb8c4;font-size:22px;font-weight:600;}
  .batt{display:flex;align-items:center;gap:8px;}
  .bz{width:38px;height:20px;border:2px solid #39d98a;border-radius:5px;position:relative;}
  .bz:after{content:"";position:absolute;right:-6px;top:5px;width:4px;height:8px;background:#39d98a;border-radius:0 2px 2px 0;}
  .bz i{position:absolute;left:2px;top:2px;bottom:2px;width:90%;background:#39d98a;border-radius:3px;}
  .pct{color:#39d98a;font-size:20px;font-weight:700;}
  /* identity */
  .id{position:absolute;left:46px;top:150px;}
  .id .mark{font-size:86px;font-weight:800;letter-spacing:-1px;line-height:1;}
  .id .mark b{color:#fff;} .id .mark span{color:#ff8a3d;}
  .id .tag{color:#5c6672;font-size:22px;font-weight:600;letter-spacing:6px;margin-top:12px;}
  .status{display:flex;align-items:center;gap:11px;margin-top:34px;color:#aeb8c4;font-size:23px;font-weight:600;}
  .status .d{width:12px;height:12px;border-radius:50%;background:#ffb020;box-shadow:0 0 12px #ffb020;}
  .hint{color:#5c6672;font-size:19px;font-weight:500;margin-top:14px;}
  /* info rows right */
  .info{position:absolute;right:46px;top:150px;width:330px;}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:17px 0;border-bottom:1px solid rgba(255,255,255,.07);}
  .row:first-child{border-top:1px solid rgba(255,255,255,.07);}
  .k{color:#7e8a98;font-size:19px;font-weight:600;}
  .v{font-size:23px;font-weight:700;color:#dfe6ee;}
</style></head>
<body><div class="wrap">
  <div class="cap">OpenBar — IDLE home (no model connected) · 480×272</div>
  <div class="bezel"><div class="screen">
    <div class="wm"><svg viewBox="0 0 100 100" fill="none" stroke="#fff" stroke-width="2"><circle cx="50" cy="50" r="9"/><line x1="50" y1="50" x2="50" y2="6"/><line x1="50" y1="50" x2="88" y2="72"/><line x1="50" y1="50" x2="12" y2="72"/><circle cx="50" cy="50" r="45" stroke-width="1.1" opacity=".6"/></svg></div>

    <div class="top">
      <div class="ic act"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="7" height="7" rx="1.5"/><rect x="14" y="4" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"/><circle cx="9" cy="8" r="2.4" fill="#0a0e14"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="15" cy="16" r="2.4" fill="#0a0e14"/></svg></div>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 17a8 8 0 0 1 16 0"/><path d="M7.5 17a4.5 4.5 0 0 1 9 0"/><circle cx="12" cy="17" r="1.4" fill="currentColor"/></svg></div>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.5 5.5l1.4 1.4M17.1 17.1l1.4 1.4M18.5 5.5l-1.4 1.4M6.9 17.1l-1.4 1.4"/></svg></div>
      <div class="sp"></div>
      <div class="clock">14:32</div>
      <div class="batt"><div class="bz"><i></i></div><span class="pct">98%</span></div>
    </div>

    <div class="id">
      <div class="mark"><b>Open</b><span>Bar</span></div>
      <div class="tag">OPEN HELI OS</div>
      <div class="status"><span class="d"></span>Standby — no model connected</div>
      <div class="hint">Power on your heli to begin</div>
    </div>

    <div class="info">
      <div class="row"><span class="k">Date / Time</span><span class="v">10 May · 14:32</span></div>
      <div class="row"><span class="k">Radio</span><span class="v">OpenBar TX16S</span></div>
      <div class="row"><span class="k">Firmware</span><span class="v">0.1.0-openbar</span></div>
      <div class="row"><span class="k">Active model</span><span class="v">Goblin 770</span></div>
    </div>
  </div></div>
</div>
<script>
  function fit(){var d=document.querySelector('.bezel');d.style.transform='scale(1)';var r=d.getBoundingClientRect();
    var s=Math.min((innerWidth*.96)/r.width,(innerHeight*.9)/r.height);d.style.transform='scale('+s+')';d.style.transformOrigin='center';}
  fit();addEventListener('resize',fit);
</script>
</body></html>
