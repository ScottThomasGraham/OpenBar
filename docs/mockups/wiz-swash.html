<!doctype html><html lang="en"><head><meta charset="utf-8"><title>swash type</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wiz.css"></head><body>
<div class="screen">
  <div class="hd"><span class="bk">‹</span><b>NEW HELI</b><span class="sec">Swashplate</span><span class="step">STEP 5 / 12</span><div class="pbar" style="width:42%"></div></div>
  <div class="title">Swashplate type</div>
  <div class="sub">How many servos drive the swash, and at what angles?</div>
  <div class="stage">
    <div class="diagram" style="flex:0 0 320px;height:230px">
      <!-- top-down swashplate, 120deg CCPM: 3 servos 120 apart -->
      <svg width="280" height="220" viewBox="0 0 280 220">
        <circle cx="140" cy="110" r="78" fill="rgba(255,255,255,.03)" stroke="#2a3644" stroke-width="2"/>
        <circle cx="140" cy="110" r="40" fill="none" stroke="#2a3644" stroke-width="2"/>
        <circle cx="140" cy="110" r="8" fill="#2a3644"/>
        <!-- 3 servos at 120 deg (rear, front-left, front-right) -->
        <g stroke="var(--amber)" stroke-width="3">
          <line x1="140" y1="110" x2="140" y2="190"/><line x1="140" y1="110" x2="71" y2="70"/><line x1="140" y1="110" x2="209" y2="70"/>
        </g>
        <g fill="#1a1108" stroke="var(--amber)" stroke-width="2.5">
          <rect x="128" y="186" width="24" height="18" rx="4"/><rect x="56" y="58" width="24" height="18" rx="4"/><rect x="200" y="58" width="24" height="18" rx="4"/>
        </g>
        <text x="140" y="200" fill="var(--amber2)" font-family="Barlow Semi Condensed" font-size="13" text-anchor="middle">ELE</text>
        <text x="120" y="48" fill="var(--amber2)" font-family="Barlow Semi Condensed" font-size="13" text-anchor="middle">AIL</text>
        <text x="220" y="48" fill="var(--amber2)" font-family="Barlow Semi Condensed" font-size="13" text-anchor="middle">AIL</text>
      </svg>
    </div>
    <div class="chips">
      <div class="chip on"><div class="tx" style="text-align:left"><b>H3-120°</b><span>3 servos, 120° apart (most common)</span></div></div>
      <div class="chip"><div class="tx" style="text-align:left"><b>H3-135° / 140°</b><span>3 servos, wider angle</span></div></div>
      <div class="chip"><div class="tx" style="text-align:left"><b>H1 / mech / 4-servo</b><span>In Pro</span></div></div>
    </div>
  </div>
  <div class="ft"><span class="ms"><span class="d"></span>MOTOR SAFE</span><span class="next">Looks right ›</span></div>
</div>
<script>var s=document.querySelector(".screen");function fit(){s.style.transform="scale("+Math.min(innerWidth/960,innerHeight/544)+")";}fit();onresize=fit;setTimeout(fit,500);</script>
</body></html>
