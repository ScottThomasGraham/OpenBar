<!doctype html><html lang="en"><head><meta charset="utf-8"><title>ready</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wiz.css"></head><body>
<div class="screen">
  <div class="hd"><span class="bk">‹</span><b>NEW HELI</b><span class="sec">Done</span><span class="step">STEP 12 / 12</span><div class="pbar" style="width:100%"></div></div>
  <div class="title">Ready to fly</div>
  <div class="sub">Setup written to your heli. Run the pre-flight check, then blades on.</div>
  <div class="stage" style="gap:18px">
    <div class="diagram" style="flex:0 0 230px;height:212px">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="74" fill="rgba(63,224,160,.08)" stroke="var(--green)" stroke-width="4"/>
        <path d="M68 100 l22 22 l44 -50" fill="none" stroke="var(--green)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="chips" style="gap:9px">
      <div class="chip" style="padding:9px 16px"><div class="tx" style="text-align:left"><span>HELI</span><b style="font-size:24px">Goblin 770 · H3-120°</b></div></div>
      <div class="chip" style="padding:9px 16px"><div class="tx" style="text-align:left"><span>GOVERNOR</span><b style="font-size:24px">Rotorflight · 9.33:1 · 10P</b></div></div>
      <div class="chip" style="padding:9px 16px"><div class="tx" style="text-align:left"><span>HEAD SPEED</span><b style="font-size:24px;color:var(--green)">1850 / 2000 / 2150 rpm</b></div></div>
    </div>
  </div>
  <div class="ft"><span class="ms go"><span class="d"></span>WRITTEN TO ROTORFLIGHT</span><span class="next">Finish ✓</span></div>
</div>
<script>var s=document.querySelector(".screen");function fit(){s.style.transform="scale("+Math.min(innerWidth/960,innerHeight/544)+")";}fit();onresize=fit;setTimeout(fit,500);</script>
</body></html>
