<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>OpenBar home v3</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  html,body{height:100%;overflow:hidden;background:#05070a;display:flex;align-items:center;justify-content:center;}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .cap{color:#6b7682;font-size:14px;font-weight:600;}
  .bezel{padding:14px;background:#04060a;border:1px solid #161d27;border-radius:22px;box-shadow:0 24px 70px rgba(0,0,0,.6);}
  .screen{position:relative;width:960px;height:544px;border-radius:10px;overflow:hidden;
    background:radial-gradient(130% 100% at 15% 0%, #121823 0%, #0a0e14 55%, #05080c 100%);color:#eef3f9;}
  .muted{color:#7e8a98;} .grn{color:#39d98a;} .amb{color:#ff8a3d;}

  /* top status bar */
  .top{position:absolute;top:0;left:0;right:0;height:70px;display:flex;align-items:center;padding:0 26px;gap:34px;border-bottom:1px solid rgba(255,255,255,.06);}
  .kv{display:flex;flex-direction:column;line-height:1;}
  .kv .k{color:#7e8a98;font-size:16px;font-weight:600;letter-spacing:.4px;}
  .kv .v{font-size:26px;font-weight:800;margin-top:5px;}
  .top .sp{flex:1;}
  .batt{display:flex;align-items:center;gap:9px;}
  .bz{width:40px;height:21px;border:2px solid #39d98a;border-radius:5px;position:relative;}
  .bz:after{content:"";position:absolute;right:-6px;top:5px;width:4px;height:9px;background:#39d98a;border-radius:0 2px 2px 0;}
  .bz i{position:absolute;left:2px;top:2px;bottom:2px;width:72%;background:#39d98a;border-radius:3px;}
  .ic{width:28px;height:28px;color:#9aa6b3;}.ic svg{width:28px;height:28px;}

  /* split */
  .left{position:absolute;left:0;top:70px;bottom:0;width:600px;padding:18px 24px;}
  .divider{position:absolute;left:600px;top:84px;bottom:18px;width:1px;background:rgba(255,255,255,.07);}
  .right{position:absolute;left:601px;right:0;top:70px;bottom:0;padding:16px 26px;}

  /* hero */
  .hero{display:flex;align-items:flex-end;gap:46px;}
  .hblk .l{color:#7e8a98;font-size:18px;font-weight:700;letter-spacing:4px;}
  .hblk .n{font-size:120px;line-height:.84;font-weight:800;letter-spacing:-3px;background:linear-gradient(180deg,#fff,#c4cedb);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hblk .u{color:#7e8a98;font-size:22px;font-weight:700;margin-top:4px;}
  .hblk.tmr .n{font-size:92px;background:linear-gradient(180deg,#fff,#cdd7e3);-webkit-background-clip:text;background-clip:text;color:transparent;}

  /* pack bar */
  .pack{margin-top:26px;}
  .pack .lab{display:flex;justify-content:space-between;color:#9aa6b3;font-size:19px;font-weight:700;margin-bottom:8px;}
  .bar{height:30px;border-radius:9px;background:#10151c;border:1px solid rgba(255,255,255,.06);overflow:hidden;position:relative;}
  .bar i{position:absolute;left:0;top:0;bottom:0;width:78%;background:linear-gradient(90deg,#2fbf78,#39d98a);border-radius:9px;}
  .bar b{position:absolute;right:12px;top:0;bottom:0;display:flex;align-items:center;color:#04140c;font-size:18px;font-weight:800;}

  /* mini stats row */
  .mini{display:flex;gap:14px;margin-top:24px;}
  .m{flex:1;background:#11161d;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;}
  .m .k{color:#7e8a98;font-size:15px;font-weight:700;letter-spacing:.5px;}
  .m .v{font-size:30px;font-weight:800;margin-top:6px;}
  .m .v small{color:#7e8a98;font-size:16px;font-weight:600;}
  .thr{height:8px;border-radius:4px;background:#1b222b;margin-top:12px;overflow:hidden;}
  .thr i{display:block;height:100%;width:8%;background:#ff8a3d;border-radius:4px;}

  /* right column rows */
  .rrow{padding:16px 2px;border-bottom:1px solid rgba(255,255,255,.07);}
  .rrow:first-child{padding-top:6px;}
  .rk{color:#7e8a98;font-size:16px;font-weight:600;letter-spacing:.4px;}
  .rv{font-size:30px;font-weight:800;margin-top:4px;}
  .two{display:flex;justify-content:space-between;}
  .two>div{flex:1;}
  .model .rv{font-size:34px;color:#fff;}
  .model .rk{color:#ff8a3d;}
</style></head>
<body><div class="wrap">
  <div class="cap">OpenBar — flight home v3 (rich, VBar-layout, elevated) · 480×272</div>
  <div class="bezel"><div class="screen">

    <div class="top">
      <div class="kv"><span class="k">BANK</span><span class="v amb">3 · Sport</span></div>
      <div class="kv"><span class="k">MOTOR</span><span class="v grn">ARMED</span></div>
      <div class="sp"></div>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 17a8 8 0 0 1 16 0"/><path d="M7.5 17a4.5 4.5 0 0 1 9 0"/><circle cx="12" cy="17" r="1.4" fill="currentColor"/></svg></div>
      <div class="kv"><span class="k">LINK</span><span class="v grn" style="font-size:22px">100</span></div>
      <div class="batt"><div class="bz"><i></i></div><span class="v grn" style="font-size:24px">72%</span></div>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.5 5.5l1.4 1.4M17.1 17.1l1.4 1.4M18.5 5.5l-1.4 1.4M6.9 17.1l-1.4 1.4"/></svg></div>
    </div>

    <div class="left">
      <div class="hero">
        <div class="hblk"><div class="l">HEADSPEED</div><div class="n">1,850</div><div class="u">RPM</div></div>
        <div class="hblk tmr"><div class="l">FLIGHT</div><div class="n">04:312</div><div class="u">MM:SS</div></div>
      </div>
      <div class="pack">
        <div class="lab"><span>ManiaX 5500 · 6S</span><span class="grn">24.6V</span></div>
        <div class="bar"><i></i><b>78%</b></div>
      </div>
      <div class="mini">
        <div class="m"><div class="k">ESC TEMP</div><div class="v">61<small>°C</small></div></div>
        <div class="m"><div class="k">CURRENT</div><div class="v">38<small>A</small></div></div>
        <div class="m"><div class="k">THROTTLE</div><div class="v">72<small>%</small></div><div class="thr"><i style="width:72%"></i></div></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="right">
      <div class="rrow two"><div><div class="rk">CURRENT</div><div class="rv">38.2<small style="font-size:16px;color:#7e8a98"> A</small></div></div><div><div class="rk">VOLTAGE</div><div class="rv">24.6<small style="font-size:16px;color:#7e8a98"> V</small></div></div></div>
      <div class="rrow two"><div><div class="rk">PEAK A</div><div class="rv">86</div></div><div><div class="rk">MIN V</div><div class="rv">22.9</div></div></div>
      <div class="rrow"><div class="rk">USED</div><div class="rv">1,850 <small style="font-size:16px;color:#7e8a98">mAh · 14:32</small></div></div>
      <div class="rrow model"><div class="rk">MODEL</div><div class="rv">Goblin 770</div></div>
    </div>

  </div></div>
</div>
<script>
  function fit(){var d=document.querySelector('.bezel');d.style.transform='scale(1)';var r=d.getBoundingClientRect();
    var s=Math.min((innerWidth*.96)/r.width,(innerHeight*.9)/r.height);d.style.transform='scale('+s+')';d.style.transformOrigin='center';}
  fit();addEventListener('resize',fit);
</script>
</body></html>
