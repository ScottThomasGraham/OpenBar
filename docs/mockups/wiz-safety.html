<!doctype html><html lang="en"><head><meta charset="utf-8"><title>safety</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wiz.css"></head><body>
<div class="screen">
  <div class="hd"><span class="bk">‹</span><b>NEW HELI</b><span class="sec">Safety</span><span class="step">STEP 1 / 13</span><div class="pbar" style="width:8%"></div></div>
  <div class="title">Before we begin</div>
  <div class="sub">Two things, then Evora keeps the motor safe the whole way.</div>
  <div class="stage">
    <div class="diagram" style="flex:0 0 320px;height:236px">
      <svg width="300" height="236" viewBox="0 0 300 236">
        <!-- shield -->
        <path d="M150 14 L262 52 V128 C262 188 214 214 150 230 C86 214 38 188 38 128 V52 Z" fill="rgba(63,224,160,.07)" stroke="var(--green)" stroke-width="3"/>
        <!-- heli glyph inside: body + boom + main shaft, blades removed (stubs) -->
        <circle cx="150" cy="118" r="6" fill="var(--green)"/>
        <rect x="143" y="118" width="14" height="70" rx="5" fill="#18222e" stroke="#2a3644"/>
        <rect x="128" y="92" width="44" height="48" rx="12" fill="#18222e" stroke="#2a3644" stroke-width="2"/>
        <!-- blade stubs + crossed -->
        <line x1="150" y1="118" x2="108" y2="104" stroke="#3a4756" stroke-width="6" stroke-linecap="round"/>
        <line x1="150" y1="118" x2="192" y2="104" stroke="#3a4756" stroke-width="6" stroke-linecap="round"/>
        <circle cx="92" cy="98" r="13" fill="none" stroke="var(--red)" stroke-width="3"/><line x1="83" y1="89" x2="101" y2="107" stroke="var(--red)" stroke-width="3"/>
        <!-- check -->
        <path d="M132 150 l12 12 l24 -26" fill="none" stroke="var(--green)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="chips">
      <div class="chip"><div class="ico"><svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="15" fill="none" stroke="var(--red)" stroke-width="3"/><line x1="10" y1="10" x2="30" y2="30" stroke="var(--red)" stroke-width="3"/></svg></div><div class="tx"><b>Remove the blades</b><span>So nothing can spin up</span></div></div>
      <div class="chip"><div class="ico"><svg width="40" height="40" viewBox="0 0 40 40"><rect x="9" y="18" width="22" height="15" rx="3" fill="none" stroke="var(--green)" stroke-width="3"/><path d="M13 18 v-5 a7 7 0 0 1 14 0 v5" fill="none" stroke="var(--green)" stroke-width="3"/></svg></div><div class="tx"><b>Motor stays disarmed</b><span>Evora holds it safe until the end</span></div></div>
    </div>
  </div>
  <div class="ft"><span class="ms"><span class="d"></span>MOTOR SAFE</span><span class="next">I'm ready ›</span></div>
</div>
