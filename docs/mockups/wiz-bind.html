<!doctype html><html lang="en"><head><meta charset="utf-8"><title>bind</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wiz.css"></head><body>
<div class="screen">
  <div class="hd"><span class="bk">‹</span><b>NEW HELI</b><span class="sec">Link</span><span class="step">STEP 3 / 12</span><div class="pbar" style="width:25%"></div></div>
  <div class="title">Bind your heli</div>
  <div class="sub">Power on the heli. It enters bind mode after ~10 s.</div>
  <div class="stage">
    <div class="diagram" style="flex:0 0 360px;height:200px">
      <svg width="360" height="200" viewBox="0 0 360 200">
        <!-- radio -->
        <rect x="20" y="70" width="74" height="60" rx="10" fill="#18222e" stroke="var(--amber)" stroke-width="2.5"/>
        <rect x="32" y="80" width="50" height="26" rx="3" fill="#0d141c"/><circle cx="40" cy="120" r="4" fill="#2a3644"/><circle cx="74" cy="120" r="4" fill="#2a3644"/>
        <text x="57" y="152" fill="var(--dim)" font-family="Barlow Semi Condensed" font-weight="600" font-size="15" text-anchor="middle">EVORA</text>
        <!-- waves -->
        <g fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round">
          <path d="M150 100 a18 18 0 0 1 0 0"/>
          <path d="M138 86 a26 26 0 0 1 0 28"/><path d="M158 78 a40 40 0 0 1 0 44"/><path d="M178 70 a54 54 0 0 1 0 60"/>
        </g>
        <circle cx="128" cy="100" r="5" fill="var(--green)"/>
        <!-- heli (top icon) -->
        <g stroke="#6f7c89" stroke-width="3" fill="none" stroke-linecap="round"><line x1="250" y1="78" x2="330" y2="78"/><line x1="290" y1="78" x2="290" y2="112"/><rect x="277" y="112" width="26" height="22" rx="6" fill="#18222e"/><line x1="303" y1="123" x2="338" y2="123"/></g>
        <text x="294" y="152" fill="var(--dim)" font-family="Barlow Semi Condensed" font-weight="600" font-size="15" text-anchor="middle">FlyDragon</text>
      </svg>
    </div>
    <div class="chips">
      <div class="chip on"><div class="ico"><svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="6" fill="var(--amber)"/><g fill="none" stroke="var(--amber2)" stroke-width="3"><path d="M28 12 a12 12 0 0 1 0 16"/><path d="M33 7 a19 19 0 0 1 0 26"/></g></svg></div><div class="tx"><b>FlyDragon F722</b><span>In bind mode — tap to pair</span></div></div>
      <div style="color:var(--muted);font-size:19px;padding:4px 4px">Searching for helis in bind mode…</div>
    </div>
  </div>
  <div class="ft"><span class="ms go"><span class="d"></span>SEARCHING</span><span class="next">Pair ›</span></div>
</div>
<script>var s=document.querySelector(".screen");function fit(){s.style.transform="scale("+Math.min(innerWidth/960,innerHeight/544)+")";}fit();onresize=fit;setTimeout(fit,500);</script>
</body></html>
