<!doctype html><html lang="en"><head><meta charset="utf-8"><title>tail</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wiz.css"></head><body>
<div class="screen">
  <div class="hd"><span class="bk">‹</span><b>NEW HELI</b><span class="sec">Tail</span><span class="step">STEP 9 / 12</span><div class="pbar" style="width:75%"></div></div>
  <div class="title">Tail travel <span class="live">LIVE</span></div>
  <div class="sub">Hold full pedal. Open travel until the slider just reaches the mechanical limit.</div>
  <div class="stage">
    <div class="diagram" style="flex:0 0 440px;height:220px">
      <svg width="440" height="220" viewBox="0 0 440 220">
        <!-- tail boom + gearbox (rear view) -->
        <rect x="20" y="104" width="150" height="14" rx="7" fill="#18222e" stroke="#2a3644"/>
        <circle cx="200" cy="111" r="34" fill="rgba(255,255,255,.03)" stroke="#2a3644" stroke-width="2"/>
        <!-- tail blades -->
        <g stroke="#3a4756" stroke-width="9" stroke-linecap="round"><line x1="200" y1="60" x2="200" y2="162"/></g>
        <circle cx="200" cy="111" r="7" fill="#2a3644"/>
        <!-- travel arrows -->
        <path d="M250 111 h120 m-18 -12 l18 12 l-18 12" fill="none" stroke="var(--green)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="312" y="96" fill="var(--green)" font-family="Barlow Semi Condensed" font-weight="600" font-size="15" text-anchor="middle">PEDAL</text>
        <!-- travel slider -->
        <rect x="40" y="184" width="360" height="12" rx="6" fill="#223040"/>
        <rect x="40" y="184" width="320" height="12" rx="6" fill="var(--green)"/>
        <rect x="386" y="178" width="6" height="24" rx="3" fill="var(--red)"/><text x="389" y="172" fill="var(--red)" font-family="Barlow Semi Condensed" font-size="13" text-anchor="middle">limit</text>
      </svg>
    </div>
    <div class="panel" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px">
      <div class="vlbl">TRAVEL</div><div class="val" style="font-size:96px">92<span style="font-size:44px">%</span></div>
      <div class="adj"><div class="btn">−</div><div class="btn">+</div></div>
    </div>
  </div>
  <div class="ft"><span class="ms"><span class="d"></span>MOTOR SAFE · tail servo: 1520µs digital</span><span class="next">Set ›</span></div>
</div>
<script>var s=document.querySelector(".screen");function fit(){s.style.transform="scale("+Math.min(innerWidth/960,innerHeight/544)+")";}fit();onresize=fit;setTimeout(fit,500);</script>
</body></html>
