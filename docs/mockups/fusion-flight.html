<!doctype html>

<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#0c0c0d;display:flex;align-items:center;justify-content:center;font-family:"IBM Plex Sans",sans-serif;}
  .bezel{padding:16px;background:#161617;border:1px solid #2a2a2c;border-radius:18px;}
  .s{position:relative;width:960px;height:544px;border-radius:10px;overflow:hidden;background:#0a0b0c;color:#eef0ec;}
  .lime{color:#c6f24e;}.mut{color:#6a6d64;}
  .mono{font-family:"IBM Plex Mono";}
  .top{display:flex;align-items:center;gap:12px;padding:16px 22px;font-family:"IBM Plex Mono";font-weight:600;font-size:17px;letter-spacing:.5px;}
  .minidog{height:22px;fill:#c6f24e;filter:drop-shadow(0 0 6px rgba(198,242,78,.5));}
  .sp{flex:1;}
  .armed{color:#c6f24e;border:1px solid #c6f24e;border-radius:20px;padding:3px 13px;font-size:14px;}
  .wmark{position:absolute;right:-40px;bottom:-30px;height:360px;opacity:.05;fill:#c6f24e;pointer-events:none;}
  /* layout */
  .wrap{position:absolute;top:60px;left:20px;right:20px;bottom:18px;display:grid;grid-template-columns:320px 1fr;gap:16px;}
  .card{background:#15171a;border:1px solid #23262a;border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,.4);}
  .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
  .hero .lbl{position:absolute;top:22px;font-family:"IBM Plex Mono";font-size:14px;letter-spacing:2px;color:#6a6d64;}
  .hero .n{font-family:"IBM Plex Sans";font-weight:700;font-size:72px;line-height:.9;}
  .hero .u{font-family:"IBM Plex Mono";font-size:16px;color:#6a6d64;margin-top:4px;}
  .right{display:grid;grid-template-rows:auto 1fr auto;gap:16px;}
  .batt{padding:20px 22px;display:flex;flex-direction:column;gap:12px;}
  .batt .r1{display:flex;justify-content:space-between;align-items:baseline;}
  .batt .big{font-weight:700;font-size:40px;}
  .bar{height:14px;background:#23262a;border-radius:8px;position:relative;overflow:hidden;}
  .bar i{position:absolute;inset:0 28% 0 0;background:#c6f24e;border-radius:8px;}
  .meds{display:flex;gap:16px;}
  .med{flex:1;background:#15171a;border:1px solid #23262a;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 0;}
  .med .v{font-weight:700;font-size:30px;margin-top:8px;}
  .med .k{font-family:"IBM Plex Mono";font-size:13px;color:#6a6d64;letter-spacing:1px;}
  .stats{display:flex;gap:16px;}
  .st{flex:1;background:#15171a;border:1px solid #23262a;border-radius:18px;padding:13px 16px;}
  .st .v{font-weight:700;font-size:28px;}
  .st .k{font-family:"IBM Plex Mono";font-size:12px;color:#6a6d64;letter-spacing:1px;margin-top:1px;}
  svg .trk{stroke:#23262a;} svg .ind{stroke:#c6f24e;stroke-linecap:round;}
</style></head>
