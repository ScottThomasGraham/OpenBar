<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>OpenBar home v2</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  html,body{height:100%;overflow:hidden;background:#05070a;display:flex;align-items:center;justify-content:center;}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .cap{color:#6b7682;font-size:14px;font-weight:600;letter-spacing:.3px;}
  .bezel{padding:14px;background:#04060a;border:1px solid #161d27;border-radius:22px;box-shadow:0 24px 70px rgba(0,0,0,.6);}
  /* TX16S screen 480x272, rendered 2x for crispness */
  .screen{position:relative;width:960px;height:544px;border-radius:10px;overflow:hidden;
    background:radial-gradient(120% 90% at 18% 20%, #121823 0%, #0a0e14 55%, #06090d 100%);color:#eef3f9;}

  /* faint rotor watermark */
  .wm{position:absolute;left:-40px;top:90px;width:430px;height:430px;opacity:.05;}
  .wm svg{width:100%;height:100%;}

  /* top toolbar */
  .bar{position:absolute;top:0;left:0;right:0;height:74px;display:flex;align-items:center;
    padding:0 28px;gap:22px;}
  .icon{width:30px;height:30px;color:#9aa6b3;display:flex;align-items:center;justify-content:center;}
  .icon svg{width:26px;height:26px;}
  .icon.active{color:#ff8a3d;}
  .spacer{flex:1;}
  .stat{display:flex;align-items:center;gap:8px;color:#aeb8c4;font-size:22px;font-weight:600;}
  .batt{display:flex;align-items:center;gap:7px;}
  .bz{width:34px;height:18px;border:2px solid #39d98a;border-radius:4px;position:relative;}
  .bz:after{content:"";position:absolute;right:-5px;top:4px;width:3px;height:8px;background:#39d98a;border-radius:0 2px 2px 0;}
  .bz i{position:absolute;left:2px;top:2px;bottom:2px;width:70%;background:#39d98a;border-radius:2px;}
  .pct{color:#39d98a;font-size:20px;font-weight:700;}

  /* hero headspeed */
  .hero{position:absolute;left:34px;top:120px;}
  .hero .lbl{color:#7b8694;font-size:21px;font-weight:700;letter-spacing:5px;}
  .hero .val{font-size:188px;line-height:.9;font-weight:800;letter-spacing:-4px;
    background:linear-gradient(180deg,#ffffff,#c4cedb);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero .row{display:flex;align-items:center;gap:16px;margin-top:6px;}
  .hero .unit{color:#7b8694;font-size:30px;font-weight:700;}
  .gov{display:flex;align-items:center;gap:9px;color:#39d98a;font-size:20px;font-weight:700;}
  .gd{width:11px;height:11px;border-radius:50%;background:#39d98a;box-shadow:0 0 12px #39d98a;}

  /* right vitals — quiet label/value rows with hairline dividers */
  .vitals{position:absolute;right:34px;top:150px;width:300px;}
  .vrow{display:flex;justify-content:space-between;align-items:baseline;padding:18px 2px;border-bottom:1px solid rgba(255,255,255,.07);}
  .vrow:first-child{border-top:1px solid rgba(255,255,255,.07);}
  .vk{color:#7b8694;font-size:20px;font-weight:600;letter-spacing:.5px;}
  .vv{font-size:30px;font-weight:700;color:#eef3f9;}
  .vv small{color:#7b8694;font-size:18px;font-weight:600;margin-left:3px;}

  /* bottom wordmark + status */
  .foot{position:absolute;left:0;right:0;bottom:0;height:62px;display:flex;align-items:center;padding:0 30px;}
  .mark{font-size:30px;font-weight:800;letter-spacing:.5px;}
  .mark b{color:#fff;} .mark span{color:#ff8a3d;font-weight:800;}
  .tag{color:#5c6672;font-size:16px;font-weight:600;margin-left:10px;letter-spacing:2px;}
  .pills{margin-left:auto;display:flex;align-items:center;gap:14px;}
  .pill{display:flex;align-items:center;gap:8px;font-size:19px;font-weight:700;}
  .pill .pd{width:9px;height:9px;border-radius:50%;}
  .amber{color:#ffb27a;} .amber .pd{background:#ff8a3d;}
  .green{color:#39d98a;} .green .pd{background:#39d98a;}
</style></head>
<body>
<div class="wrap">
  <div class="cap">OpenBar — home (VBar-inspired, elevated) · TX16S 480×272</div>
  <div class="bezel"><div class="screen">

    <div class="wm"><svg viewBox="0 0 100 100" fill="none" stroke="#ffffff" stroke-width="2"><circle cx="50" cy="50" r="9"/><line x1="50" y1="50" x2="50" y2="6"/><line x1="50" y1="50" x2="88" y2="72"/><line x1="50" y1="50" x2="12" y2="72"/><circle cx="50" cy="50" r="44" stroke-width="1.2" opacity=".6"/></svg></div>

    <div class="bar">
      <div class="icon active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h4l3-7 4 14 3-7h4"/></svg></div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 18a8 8 0 0 1 16 0"/><path d="M7 18a5 5 0 0 1 10 0"/><circle cx="12" cy="18" r="1.4" fill="currentColor"/></svg></div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="7" height="7" rx="1.5"/><rect x="14" y="4" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"/><circle cx="9" cy="8" r="2.4" fill="#0a0e14"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="15" cy="16" r="2.4" fill="#0a0e14"/></svg></div>
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.5 5.5l1.4 1.4M17.1 17.1l1.4 1.4M18.5 5.5l-1.4 1.4M6.9 17.1l-1.4 1.4"/></svg></div>
      <div class="spacer"></div>
      <div class="stat">14:32</div>
      <div class="batt"><div class="bz"><i></i></div><div class="pct">71%</div></div>
    </div>

    <div class="hero">
      <div class="lbl">HEADSPEED</div>
      <div class="val">2,010</div>
      <div class="row"><div class="unit">RPM</div><div class="gov"><span class="gd"></span>GOVERNOR</div></div>
    </div>

    <div class="vitals">
      <div class="vrow"><span class="vk">PACK</span><span class="vv">24.6<small>V</small></span></div>
      <div class="vrow"><span class="vk">CURRENT</span><span class="vv">38<small>A</small></span></div>
      <div class="vrow"><span class="vk">USED</span><span class="vv">1.85<small>Ah</small></span></div>
      <div class="vrow"><span class="vk">ESC TEMP</span><span class="vv">61<small>°C</small></span></div>
    </div>

    <div class="foot">
      <div class="mark"><b>Open</b><span>Bar</span></div><div class="tag">GOBLIN 770</div>
      <div class="pills">
        <div class="pill amber"><span class="pd"></span>BANK 2</div>
        <div class="pill green"><span class="pd"></span>RESCUE ARMED</div>
      </div>
    </div>

  </div></div>
</div>
<script>
  function fit(){var d=document.querySelector('.bezel');d.style.transform='scale(1)';var r=d.getBoundingClientRect();
    var s=Math.min((innerWidth*.96)/r.width,(innerHeight*.9)/r.height);d.style.transform='scale('+s+')';d.style.transformOrigin='center';}
  fit();addEventListener('resize',fit);
</script>
</body></html>
