<!doctype html><html lang="en"><head><meta charset="utf-8"><title>rotor dir</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wiz.css"></head><body>
<div class="screen">
  <div class="hd"><span class="bk">‹</span><b>NEW HELI</b><span class="sec">Rotor</span><span class="step">STEP 6 / 12</span><div class="pbar" style="width:50%"></div></div>
  <div class="title">Main rotor direction</div>
  <div class="sub">Looking down at the heli from above — which way does it spin?</div>
  <div class="stage">
    <div class="diagram" style="flex:0 0 320px;height:230px">
      <svg width="280" height="220" viewBox="0 0 280 220">
        <!-- disc -->
        <circle cx="140" cy="106" r="86" fill="rgba(255,146,66,.04)" stroke="#2a3644" stroke-width="2" stroke-dasharray="3 6"/>
        <!-- blades -->
        <g stroke="#3a4756" stroke-width="10" stroke-linecap="round"><line x1="60" y1="106" x2="220" y2="106"/></g>
        <circle cx="140" cy="106" r="9" fill="#2a3644"/>
        <!-- CW arrow -->
        <path d="M140 30 A76 76 0 0 1 216 106" fill="none" stroke="var(--amber)" stroke-width="5"/>
        <path d="M216 106 l-10 -16 m10 16 l-16 8" fill="none" stroke="var(--amber)" stroke-width="5" stroke-linecap="round"/>
        <text x="140" y="200" fill="var(--dim)" font-family="Barlow Semi Condensed" font-weight="600" font-size="15" letter-spacing="2" text-anchor="middle">FROM ABOVE</text>
      </svg>
    </div>
    <div class="chips">
      <div class="chip on"><div class="ico"><svg width="40" height="40" viewBox="0 0 40 40"><path d="M20 6 A14 14 0 0 1 34 20" fill="none" stroke="var(--amber)" stroke-width="3.5"/><path d="M34 20 l-2 -7 m2 7 l-7 2" stroke="var(--amber)" stroke-width="3.5" fill="none" stroke-linecap="round"/></svg></div><div class="tx"><b>Clockwise</b><span>Most helis</span></div></div>
      <div class="chip"><div class="ico"><svg width="40" height="40" viewBox="0 0 40 40"><path d="M20 6 A14 14 0 0 0 6 20" fill="none" stroke="#6f7c89" stroke-width="3.5"/><path d="M6 20 l2 -7 m-2 7 l7 2" stroke="#6f7c89" stroke-width="3.5" fill="none" stroke-linecap="round"/></svg></div><div class="tx"><b>Counter-CW</b><span>Some scale / nitro</span></div></div>
    </div>
  </div>
  <div class="ft"><span class="ms"><span class="d"></span>MOTOR SAFE</span><span class="next">Looks right ›</span></div>
</div>
<script>var s=document.querySelector(".screen");function fit(){s.style.transform="scale("+Math.min(innerWidth/960,innerHeight/544)+")";}fit();onresize=fit;setTimeout(fit,500);</script>
</body></html>
